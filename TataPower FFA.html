<body>
<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="s-logo">
      <div class="s-mark">TP</div>
      <div>
        <div class="s-name">TataPower</div>
        <div class="s-sub">Field Force App · SCM</div>
      </div>
    </div>

    <div class="nav-sec">Overview</div>
    <div class="ni active" data-s="dashboard">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z"/></svg>
      Dashboard
    </div>

    <div class="nav-sec">Master Data</div>
    <div class="ni" data-s="projects">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3a1 1 0 011-1h2.5l1 1H13a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" opacity=".85"/></svg>
      Project Master
    </div>
    <div class="ni" data-s="activities">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h12v1.5H2zm0 3.5h8v1.5H2zm0 3.5h10v1.5H2z"/></svg>
      Activities Master
    </div>
    <div class="ni" data-s="vendors">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a3 3 0 100 6 3 3 0 000-6zM4 11a4 4 0 018 0v2H4v-2z"/></svg>
      Vendor Master
    </div>

    <div class="nav-sec">Planning</div>
    <div class="ni" data-s="proj-act">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2h10a1 1 0 011 1v2H2V3a1 1 0 011-1zM2 6h12v7a1 1 0 01-1 1H3a1 1 0 01-1-1V6z" opacity=".85"/></svg>
      Project–Activity
    </div>
    <div class="ni" data-s="proj-vendor">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h5v2H2zm7 0h5v2H9zM2 7h12v1H2zm0 3h5v2H2zm7 0h5v2H9z"/></svg>
      Activity–Vendor Map
    </div>

    <div class="nav-sec">Monitoring</div>
    <div class="ni" data-s="monitoring">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11l3-4 3 3 3-5 3 2"/></svg>
      Progress &amp; MIS
    </div>

    <div class="s-user">
      <div class="av">RK</div>
      <div>
        <div class="s-uname">Rahul Kulkarni</div>
        <div class="s-urole">Project Manager</div>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────── -->
  <div id="main">
    <header id="hdr">
      <span class="hdr-title" id="htitle">Dashboard</span>
      <span class="hdr-badge">SCM Phase · EPC</span>
      <span class="hdr-sp"></span>
      <button class="hdr-btn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H2v1l5 6v5l2 1v-6L14 3V2z"/></svg>
        Filter
      </button>
      <button class="hdr-btn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v7m-3-3l3 3 3-3M3 11H2v3h12v-3h-1"/></svg>
        Export
      </button>
      <button class="hdr-btn hdr-bell">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2a4 4 0 014 4c0 4 1.5 5 1.5 5h-11S4 10 4 6a4 4 0 014-4zm-1 10h2a1 1 0 01-2 0z"/></svg>
        <span class="bell-dot">4</span>
      </button>
      <div class="hdr-av">RK</div>
    </header>
    <div id="content"></div>
  </div>

</div>
<script src="ffa-app.js"></script>
<div id="tweaks-root"></div>
