<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TataPower — Field Engineer App</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <script src="image-slot.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .stage-label {
      color: rgba(255, 255, 255, .38);
      font-size: 11px;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* ── Device Shell ── */
    .device {
      width: 375px;
      background: #000;
      border-radius: 50px;
      padding: 14px;
      box-shadow: 0 0 0 1px #333, 0 40px 80px rgba(0, 0, 0, .7), inset 0 0 0 1px #444;
      position: relative;
    }

    .device-inner {
      width: 100%;
      border-radius: 38px;
      overflow: hidden;
      background: #f0f2f5;
      position: relative;
    }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      gap: 6px;
    }

    .di-cam {
      width: 10px;
      height: 10px;
      background: #1a1a1a;
      border-radius: 50%;
      border: 2px solid #2a2a2a;
    }

    .di-led {
      width: 6px;
      height: 6px;
      background: #0c4;
      border-radius: 50%;
      opacity: .7;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      background: inherit;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 6px;
      font-size: 12px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }

    .sb-time {
      font-size: 15px;
      font-weight: 700;
    }

    .sb-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Screen container */
    .screen-wrap {
      height: 780px;
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: transform .32s cubic-bezier(.4, 0, .2, 1), opacity .25s;
      will-change: transform;
    }

    .screen.hidden-right {
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
    }

    .screen.hidden-left {
      transform: translateX(-30%);
      opacity: 0;
      pointer-events: none;
    }

    /* Home indicator */
    .home-bar {
      height: 34px;
      background: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-pill {
      width: 134px;
      height: 5px;
      background: #000;
      border-radius: 3px;
      opacity: .18;
    }

    /* ── App Styles ── */
    :root {
      --navy: #0C1D56;
      --red: #D42027;
      --bg: #F0F2F7;
      --card: #fff;
      --bdr: #E2E8F0;
      --txt: #111827;
      --txt2: #4B5563;
      --txt3: #9CA3AF;
      --g: #059669;
      --gbg: #ECFDF5;
      --w: #D97706;
      --wbg: #FFFBEB;
      --e: #DC2626;
      --ebg: #FEF2F2;
      --b: #1D4ED8;
      --bbg: #EFF6FF;
    }

    /* LOGIN */
    .login-bg {
      min-height: 780px;
      background: linear-gradient(165deg, #0C1D56 0%, #1B2E8A 55%, #0C1D56 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .login-bg::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(212, 32, 39, .25) 0%, transparent 70%);
      border-radius: 50%;
    }

    .login-logo {
      width: 80px;
      height: 52px;
      background: transparent;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      overflow: visible;
    }

    .login-logo svg {
      width: 80px;
      height: 52px;
    }

    .login-logo-t {
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -1px;
      display: none;
    }

    .login-app-n {
      color: rgba(255, 255, 255, .95);
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .login-sub {
      color: rgba(255, 255, 255, .45);
      font-size: 12px;
      margin-bottom: 44px;
    }

    .login-card {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      backdrop-filter: blur(12px);
    }

    .login-role {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .role-btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: 10px;
      border: 1.5px solid rgba(255, 255, 255, .18);
      background: transparent;
      color: rgba(255, 255, 255, .55);
      font-size: 12px;
      font-weight: 500;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .role-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .lf {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, .45);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .lfc {
      width: 100%;
      height: 44px;
      background: rgba(255, 255, 255, .09);
      border: 1.5px solid rgba(255, 255, 255, .15);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      margin-bottom: 14px;
      outline: none;
    }

    .lfc::placeholder {
      color: rgba(255, 255, 255, .3);
    }

    .lfc:focus {
      border-color: rgba(255, 255, 255, .4);
    }

    .pin-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .pin-dot {
      flex: 1;
      height: 44px;
      background: rgba(255, 255, 255, .09);
      border: 1.5px solid rgba(255, 255, 255, .15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
    }

    .login-btn {
      width: 100%;
      height: 48px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
      letter-spacing: .3px;
    }

    .login-btn:hover {
      opacity: .9;
    }

    .login-vendor-badge {
      margin-top: 20px;
      text-align: center;
    }

    .vendor-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .vendor-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
    }

    .vendor-tag-t {
      font-size: 11.5px;
      color: rgba(255, 255, 255, .6);
    }

    /* TOP NAV (app screens) */
    .app-header {
      background: var(--navy);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .ah-back {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, .1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
    }

    .ah-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .ah-sub {
      font-size: 10.5px;
      color: rgba(255, 255, 255, .5);
      margin-top: 1px;
      text-align: center;
    }

    .ah-right {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, .1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
    }

    /* HOME */
    .home-hero {
      background: linear-gradient(135deg, var(--navy) 0%, #1B2E8A 100%);
      padding: 14px 18px 22px;
    }

    .hero-greeting {
      font-size: 11px;
      color: rgba(255, 255, 255, .5);
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .hero-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }

    .hero-meta {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .hero-pill {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, .75);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hero-pill-dot {
      width: 5px;
      height: 5px;
      background: #4ade80;
      border-radius: 50%;
    }

    .home-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 12px 14px 0;
      margin-top: -14px;
      position: relative;
      z-index: 5;
    }

    .hs-card {
      background: #fff;
      border-radius: 12px;
      padding: 10px 10px 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
    }

    .hs-v {
      font-size: 22px;
      font-weight: 700;
      color: var(--txt);
      line-height: 1;
    }

    .hs-l {
      font-size: 10px;
      color: var(--txt2);
      margin-top: 2px;
    }

    .section-header {
      padding: 16px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sh-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--txt);
    }

    .sh-link {
      font-size: 12px;
      color: var(--b);
      font-weight: 500;
      cursor: pointer;
    }

    .act-card {
      margin: 0 14px 10px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .15s;
    }

    .act-card:active {
      border-color: var(--navy);
    }

    .act-card-head {
      padding: 12px 14px 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .act-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--txt);
    }

    .act-path {
      font-size: 10.5px;
      color: var(--txt3);
      margin-top: 2px;
      line-height: 1.4;
    }

    .act-body {
      padding: 0 14px 12px;
    }

    .act-prog-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .act-pr {
      flex: 1;
      height: 6px;
      background: #E5E7EB;
      border-radius: 3px;
      overflow: hidden;
    }

    .act-pr-f {
      height: 100%;
      border-radius: 3px;
      background: var(--b);
    }

    .act-pr-pct {
      font-size: 11px;
      font-weight: 600;
      color: var(--txt2);
      width: 30px;
      text-align: right;
    }

    .act-nums {
      display: flex;
      gap: 12px;
    }

    .act-num {
      font-size: 11px;
      color: var(--txt2);
    }

    .act-num strong {
      color: var(--txt);
    }

    .act-foot {
      background: #FAFBFF;
      padding: 7px 14px;
      border-top: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .enter-btn {
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10.5px;
      font-weight: 500;
    }

    .c-g {
      background: var(--gbg);
      color: var(--g);
    }

    .c-y {
      background: var(--wbg);
      color: var(--w);
    }

    .c-b {
      background: var(--bbg);
      color: var(--b);
    }

    .c-r {
      background: var(--ebg);
      color: var(--e);
    }

    .c-x {
      background: #F3F4F6;
      color: var(--txt2);
    }

    .c-n {
      background: #EEF2FF;
      color: var(--navy);
    }

    .notice-bar {
      margin: 0 14px 10px;
      background: var(--wbg);
      border: 1px solid #FDE68A;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
    }

    .nb-icon {
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .nb-t {
      font-size: 12px;
      font-weight: 600;
      color: #92400E;
    }

    .nb-s {
      font-size: 11px;
      color: #B45309;
      margin-top: 1px;
    }

    /* ENTRY FORM */
    .entry-bg {
      background: var(--bg);
      min-height: 780px;
    }

    .entry-hero {
      background: var(--navy);
      padding: 14px 18px 18px;
    }

    .entry-act-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .entry-breadcrumb {
      font-size: 10.5px;
      color: rgba(255, 255, 255, .45);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .bc-sep {
      opacity: .4;
    }

    .entry-meta-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .form-card {
      background: #fff;
      margin: 12px 14px;
      border-radius: 14px;
      box-shadow: 0 1px 8px rgba(0, 0, 0, .06);
      overflow: hidden;
    }

    .fc-head {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #F1F5F9;
    }

    .fc-head-t {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--txt);
    }

    .fc-head-s {
      font-size: 11px;
      color: var(--txt3);
      margin-top: 1px;
    }

    .fc-body {
      padding: 14px;
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
    }

    .fg:last-child {
      margin-bottom: 0;
    }

    .fl {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--txt2);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .fi {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1.5px solid var(--bdr);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--txt);
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }

    .fi:focus {
      border-color: var(--navy);
    }

    .fi-big {
      height: 52px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 2px;
      color: var(--navy);
    }

    .fi-unit {
      text-align: right;
      padding-right: 46px;
      position: relative;
    }

    .fi-unit-label {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: 600;
      color: var(--txt3);
      pointer-events: none;
    }

    .target-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .target-card {
      flex: 1;
      background: #F8FAFF;
      border: 1px solid #E0E9FF;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .tc-v {
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
    }

    .tc-l {
      font-size: 10px;
      color: var(--txt3);
      margin-top: 1px;
    }

    .quick-btns {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .qb {
      padding: 6px 12px;
      background: #EEF2FF;
      border: 1.5px solid #C7D2FE;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      background: #EEF2FF;
      transition: background .12s;
    }

    .qb:hover {
      background: #C7D2FE;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .photo-slot-wrap {
      border-radius: 10px;
      overflow: hidden;
    }

    .add-photo-btn {
      border: 2px dashed var(--bdr);
      border-radius: 10px;
      height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      background: #FAFBFF;
      transition: background .12s;
    }

    .add-photo-btn:hover {
      background: #EEF2FF;
    }

    .apb-icon {
      font-size: 20px;
      opacity: .4;
    }

    .apb-t {
      font-size: 11px;
      color: var(--txt3);
      font-weight: 500;
    }

    .remarks-ta {
      width: 100%;
      min-height: 72px;
      padding: 10px 12px;
      border: 1.5px solid var(--bdr);
      border-radius: 10px;
      font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--txt);
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    .remarks-ta:focus {
      border-color: var(--navy);
    }

    .gps-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--gbg);
      border: 1px solid #A7F3D0;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .gps-dot {
      width: 8px;
      height: 8px;
      background: var(--g);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, .2);
    }

    .gps-t {
      font-size: 12px;
      font-weight: 500;
      color: var(--g);
    }

    .gps-s {
      font-size: 10.5px;
      color: #6EE7B7;
      margin-top: 1px;
    }

    .submit-btn {
      width: calc(100% - 28px);
      margin: 0 14px 16px;
      height: 52px;
      background: var(--red);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: opacity .15s;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover {
      opacity: .92;
    }

              <div className="act-card-head">
                <div>
                  <div className="act-name">{a.name}</div>
                  <div className="act-path">
                    {a.path.map((p, j) => (
                      <span key={j}>{j > 0 ? ' › ' : ''}{p}</span>
                    ))}
                  </div>
                </div>
                <span className={`chip ${a.urgent ? 'c-r' : 'c-b'}`}>{a.urgent ? 'Urgent' : 'Active'}</span>
              </div>
              <div className="act-body">
                <div className="act-prog-row">
                  <div className="act-pr"><div className="act-pr-f" style={{ width: pct(a) + '%', background: a.urgent ? 'var(--e)' : 'var(--b)' }}></div></div>
                  <div className="act-pr-pct">{pct(a)}%</div>
                </div>
                <div className="act-nums">
                  <div className="act-num"><strong>{a.done}</strong> done</div>
                  <div className="act-num"><strong>{a.target}</strong> total</div>
                  <div className="act-num"><strong>{a.todayDone}</strong> today</div>
                  <div className="act-num" style={{ color: 'var(--txt3)' }}>{a.uom}</div>
                </div>
              </div>
              <div className="act-foot">
                <div style={{ fontSize: 11, color: 'var(--txt3)' }}>
                  <span className="chip c-n" style={{ marginRight: 4, fontSize: 10 }}>{a.id}</span>
                </div>
                <button className="enter-btn" onClick={e => { e.stopPropagation(); onSelectActivity(a); }}>
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="white"><path d="M8 2v9M4 7l4 4 4-4" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" /></svg>
                  Log Progress
                </button>
              </div>
            </div>
          ))}

          <div className="scroll-pb" />
          <BottomNav active={activeNav} onNav={onNav} />
        </div>
      );
    };

    // ── ENTRY FORM ─────────────────────────────────────────────────────
    const EntryForm = ({ activity, onBack, onSubmit }) => {
      const [qty, setQty] = useState('');
      const [remarks, setRemarks] = useState('');
      const remaining = activity.target - activity.done;
      const suggestions = [
        Math.min(remaining, Math.round(activity.target * 0.05)),
        Math.min(remaining, Math.round(activity.target * 0.1)),
        Math.min(remaining, Math.round(activity.target * 0.15)),
      ].filter((v, i, a) => v > 0 && a.indexOf(v) === i);

      return (
        <div className="entry-bg">
          <StatusBar dark />
          <div className="entry-hero">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button className="ah-back" onClick={onBack}><IcoBack /></button>
              <div>
                <div className="entry-act-title">{activity.name}</div>
                <div className="entry-breadcrumb">
                  {activity.path.map((p, i) => (
                    <span key={i}>{i > 0 && <span className="bc-sep"> › </span>}{p}</span>
                  ))}
                </div>
              </div>
            </div>
            <div className="entry-meta-row">
              <span className="hero-pill">{ENGINEER.project}</span>
              <span className="hero-pill">{ENGINEER.block}</span>
              <span className="hero-pill chip c-n" style={{ background: 'rgba(255,255,255,.1)', color: 'rgba(255,255,255,.7)', borderRadius: 20, border: '1px solid rgba(255,255,255,.15)' }}>{activity.id}</span>
            </div>
          </div>

          {/* Scope summary */}
          <div className="form-card">
            <div className="fc-head">
              <div className="fc-head-t">Scope Summary</div>
              <div className="fc-head-s">Block 12 · As of today</div>
            </div>
            <div className="fc-body" style={{ paddingBottom: 0 }}>
              <div className="target-row">
                <div className="target-card">
                  <div className="tc-v">{activity.target.toLocaleString()}</div>
                  <div className="tc-l">Total Scope ({activity.uom})</div>
                </div>
                <div className="target-card">
                  <div className="tc-v" style={{ color: 'var(--g)' }}>{activity.done.toLocaleString()}</div>
                  <div className="tc-l">Completed so far</div>
                </div>
                <div className="target-card" style={{ borderColor: '#FDE68A', background: '#FFFBEB' }}>
                  <div className="tc-v" style={{ color: 'var(--w)' }}>{remaining.toLocaleString()}</div>
                  <div className="tc-l">Remaining</div>
                </div>
              </div>
              {/* Progress bar */}
              <div style={{ marginBottom: 14 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: 11, color: 'var(--txt2)' }}>
                  <span>Overall progress</span>
                  <span style={{ fontWeight: 600, color: 'var(--navy)' }}>{Math.round(activity.done / activity.target * 100)}%</span>
                </div>
                <div style={{ height: 8, background: '#E5E7EB', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: Math.round(activity.done / activity.target * 100) + '%', background: 'var(--b)', borderRadius: 4 }}></div>
                </div>
              </div>
            </div>
          </div>

          {/* Quantity entry */}
          <div className="form-card">
            <div className="fc-head">
              <div className="fc-head-t">Today's Progress Entry</div>
              <div className="fc-head-s">29 Jun 2026 · Enter quantity completed today</div>
            </div>
            <div className="fc-body">
              <div className="fg">
                <div className="fl">Quantity Completed ({activity.uom})</div>
                <div style={{ position: 'relative' }}>
                  <input type="number" className="fi fi-big" placeholder="0"
                    value={qty} onChange={e => setQty(e.target.value)} />
                  <span className="fi-unit-label" style={{ top: '50%', transform: 'translateY(-50%)', right: 14, fontSize: 14, fontWeight: 700, color: 'var(--txt3)' }}>{activity.uom}</span>
                </div>
              </div>
              <div style={{ fontSize: 11, color: 'var(--txt3)', marginBottom: 10, marginTop: -6 }}>Quick fill:</div>
              <div className="quick-btns">
                {suggestions.map((s, i) => (
                  <button key={i} className="qb" onClick={() => setQty(String(s))}>+{s}</button>
                ))}
                <button className="qb" onClick={() => setQty(String(remaining))} style={{ background: '#ECFDF5', color: 'var(--g)' }}>Full remaining</button>
              </div>

              {/* GPS */}
              <div className="gps-row">
                <div className="gps-dot"></div>
                <div>
                  <div className="gps-t">GPS Location Captured</div>
                  <div className="gps-s">26.2389° N, 73.0243° E · Block 12, Row 8</div>
                </div>
              </div>
            </div>
          </div>

          {/* Photo evidence */}
          <div className="form-card">
            <div className="fc-head">
              <div className="fc-head-t">Photo Evidence</div>
              <div className="fc-head-s">Attach site photos (min 1 required)</div>
            </div>
            <div className="fc-body">
              <div className="photo-grid">
                <div className="photo-slot-wrap">
                  <image-slot id="site-photo-1" shape="rounded" radius="10"
                    placeholder="📷 Before photo"
                    style={{ width: '100%', height: '90px', display: 'block' }}></image-slot>
                </div>
                <div className="photo-slot-wrap">
                  <image-slot id="site-photo-2" shape="rounded" radius="10"
                    placeholder="📷 After photo"
                    style={{ width: '100%', height: '90px', display: 'block' }}></image-slot>
                </div>
                <div className="photo-slot-wrap">
                  <image-slot id="site-photo-3" shape="rounded" radius="10"
                    placeholder="📷 QC check"
                    style={{ width: '100%', height: '90px', display: 'block' }}></image-slot>
                </div>
                <div className="add-photo-btn" onClick={() => { }}>
                  <div className="apb-icon">＋</div>
                  <div className="apb-t">Add more</div>
                </div>
              </div>
            </div>
          </div>

          {/* Remarks */}
          <div className="form-card">
            <div className="fc-head">
              <div className="fc-head-t">Remarks / Issues</div>
              <div className="fc-head-s">Optional — note any delays or quality issues</div>
            </div>
            <div className="fc-body">
              <textarea className="remarks-ta" placeholder="e.g. Panel alignment delayed due to wind. QC passed for rows 1-8."
                value={remarks} onChange={e => setRemarks(e.target.value)}></textarea>
              <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
                {['No issues', 'Material delay', 'QC failed', 'Weather delay', 'Equipment issue'].map(t => (
                  <button key={t} onClick={() => setRemarks(t)}
                    style={{
                      padding: '4px 10px', background: '#F3F4F6', border: '1.5px solid var(--bdr)',
                      borderRadius: 8, fontSize: 11, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
                      color: 'var(--txt2)', transition: 'background .1s'
                    }}>{t}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="scroll-pb" />

          <button className="submit-btn" disabled={!qty || Number(qty) <= 0} onClick={() => onSubmit({ qty, remarks, activity })}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6L9 17l-5-5" /></svg>
            Submit Progress Entry
          </button>
        </div>
      );
    };

    // ── CONFIRMATION ───────────────────────────────────────────────────
    const ConfirmScreen = ({ submission, onHome }) => (
      <div className="confirm-bg">
        <StatusBar />
        <div style={{ height: 40 }} />
        <div className="confirm-icon"><IcoCheck /></div>
        <div className="confirm-title">Progress Submitted!</div>
        <div className="confirm-sub">
          Your entry has been logged and sent to the project supervisor for review.
        </div>

        <div className="confirm-summary">
          {[
            ['Activity', submission.activity.name],
            ['Activity ID', submission.activity.id],
            ['Project', ENGINEER.project],
            ['Block', ENGINEER.block],
            ['Quantity', `${submission.qty} ${submission.activity.uom}`],
            ['Date', '29 Jun 2026'],
            ['Submitted by', ENGINEER.name],
            ['Vendor', 'M/s Electrocraft'],
            ['Status', '⏳ Pending Review'],
          ].map(([k, v]) => (
            <div key={k} className="cs-row">
              <span className="cs-k">{k}</span>
              <span className="cs-v">{v}</span>
            </div>
          ))}
        </div>

        <button className="confirm-btn-p" onClick={onHome}>Log Another Activity</button>
        <button className="confirm-btn-s" onClick={onHome}>Back to Home</button>
      </div>
    );

    // ── HISTORY SCREEN ──────────────────────────────────────────────────
    const HistoryScreen = ({ onNav, activeNav }) => {
      const grouped = {};
      HISTORY.forEach(h => { if (!grouped[h.date]) grouped[h.date] = []; grouped[h.date].push(h); });
      return (
        <div style={{ background: 'var(--bg)', minHeight: 780 }}>
          <StatusBar dark />
          <div className="app-header">
            <div style={{ width: 32 }}></div>
            <div style={{ textAlign: 'center' }}>
              <div className="ah-title">My Submissions</div>
              <div className="ah-sub">All progress entries</div>
            </div>
            <div className="ah-right">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" strokeWidth="1.5"><circle cx="7" cy="7" r="4" /><path d="M11 11l3 3" strokeLinecap="round" /></svg>
            </div>
          </div>
          <div style={{ paddingTop: 8 }}>
            {Object.entries(grouped).map(([date, items]) => (
              <div key={date}>
                <div className="date-badge">{date}</div>
                {items.map((h, i) => (
                  <div key={i} className="hist-item">
                    <div className="hi-row">
                      <div className="hi-name">{h.act}</div>
                      <span className={`chip ${h.status === 'Approved' ? 'c-g' : 'c-y'}`}>{h.status}</span>
                    </div>
                    <div className="hi-meta">
                      <span>{h.qty} {h.uom}</span>
                      <span className="chip c-n" style={{ fontSize: 10, padding: '1px 5px' }}>{h.id}</span>
                      <span>Block 12</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
          <div className="scroll-pb" />
          <BottomNav active={activeNav} onNav={onNav} />
        </div>
      );
    };

    // ── PROFILE SCREEN ──────────────────────────────────────────────────
    const ProfileScreen = ({ onNav, activeNav, onLogout }) => (
      <div style={{ background: 'var(--bg)', minHeight: 780 }}>
        <StatusBar dark />
        <div style={{ background: 'linear-gradient(135deg,#0C1D56,#1B2E8A)', padding: '20px 18px 24px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{
              width: 54, height: 54, background: 'rgba(255,255,255,.15)', borderRadius: '50%',
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, fontWeight: 700, color: '#fff'
            }}>SK</div>
            <div>
              <div style={{ fontSize: 17, fontWeight: 700, color: '#fff' }}>{ENGINEER.name}</div>
              <div style={{ fontSize: 11.5, color: 'rgba(255,255,255,.55)', marginTop: 2 }}>{ENGINEER.id} · Field Engineer</div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,.4)', marginTop: 2 }}>M/s Electrocraft Solutions</div>
            </div>
          </div>
        </div>
        {[
          { label: 'Project Assignment', val: 'TPSSL-RJ-001 · Block 12' },
          { label: 'Vendor ID', val: 'V-001' },
          { label: 'Today\'s Entries', val: '3 submitted' },
          { label: 'This Week', val: '18 entries · 892 qty' },
          { label: 'Approval Rate', val: '94.2%' },
        ].map((r, i) => (
          <div key={i} style={{
            margin: '0 14px', background: '#fff', borderRadius: i === 0 ? '14px 14px 0 0' : i === 4 ? '0 0 14px 14px' : '0',
            padding: '12px 14px', borderBottom: i < 4 ? '1px solid var(--bdr)' : 'none',
            display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: i === 4 ? 10 : 0
          }}>
            <span style={{ fontSize: 13, color: 'var(--txt2)' }}>{r.label}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--txt)' }}>{r.val}</span>
          </div>
        ))}
        <div style={{ margin: '0 14px' }}>
          <button onClick={onLogout}
            style={{
              width: '100%', height: 46, background: 'var(--ebg)', border: '1.5px solid #FECACA',
              borderRadius: 12, color: 'var(--e)', fontSize: 14, fontWeight: 600, cursor: 'pointer',
              fontFamily: 'IBM Plex Sans, sans-serif'
            }}>Sign Out</button>
        </div>
        <div className="scroll-pb" />
        <BottomNav active={activeNav} onNav={onNav} />
      </div>
    );

    // ── ROOT APP ──────────────────────────────────────────────────────────
    function FieldEngineerApp() {
      const [screen, setScreen] = useState('login');   // login | home | entry | confirm | history | profile
      const [activeNav, setActiveNav] = useState('home');
      const [selActivity, setSelActivity] = useState(null);
      const [submission, setSubmission] = useState(null);
      const [prevScreen, setPrevScreen] = useState(null);

      const go = (s) => { setPrevScreen(screen); setScreen(s); };

      const handleNav = (id) => {
        setActiveNav(id);
        if (id === 'home') go('home');
        else if (id === 'tasks') go('home');
        else if (id === 'history') go('history');
        else if (id === 'profile') go('profile');
      };

      const screens = { login: 0, home: 1, entry: 2, confirm: 3, history: 1, profile: 1 };
      const cls = (s) => {
        if (s === screen) return '';
        const cur = screens[screen] ?? 0;
        const tgt = screens[s] ?? 0;
        return tgt < cur ? 'hidden-left' : 'hidden-right';
      };

      return (
        <div>
          <div className="screen-wrap">
            <div className={`screen ${cls('login')}`}>
              <LoginScreen onLogin={() => go('home')} />
            </div>
            <div className={`screen ${cls('home')}`}>
              <HomeScreen onSelectActivity={a => { setSelActivity(a); go('entry'); }} onNav={handleNav} activeNav={activeNav} />
            </div>
            <div className={`screen ${cls('entry')}`}>
              {selActivity && <EntryForm activity={selActivity} onBack={() => go('home')}
                onSubmit={s => { setSubmission(s); go('confirm'); }} />}
            </div>
            <div className={`screen ${cls('confirm')}`}>
              {submission && <ConfirmScreen submission={submission} onHome={() => { setScreen('home'); setActiveNav('home'); }} />}
            </div>
            <div className={`screen ${cls('history')}`}>
              <HistoryScreen onNav={handleNav} activeNav={activeNav} />
            </div>
            <div className={`screen ${cls('profile')}`}>
              <ProfileScreen onNav={handleNav} activeNav={activeNav} onLogout={() => go('login')} />
            </div>
          </div>
          <div className="home-bar"><div className="home-pill"></div></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('fe-app')).render(<FieldEngineerApp />);
  </script>

  <template id="__bundler_thumbnail" data-bg-color="#0C1D56">
    <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="100" fill="#1a1a2e" />
      <!-- device -->
      <rect x="52" y="4" width="56" height="92" rx="10" fill="#111" stroke="#333" stroke-width="1" />
      <rect x="54" y="6" width="52" height="88" rx="8" fill="#0C1D56" />
      <!-- dynamic island -->
      <rect x="71" y="9" width="18" height="5" rx="2.5" fill="#000" />
      <!-- status bar -->
      <rect x="58" y="17" width="10" height="3" rx="1" fill="rgba(255,255,255,.3)" />
      <!-- hero card -->
      <rect x="56" y="22" width="48" height="20" rx="4" fill="#152472" />
      <rect x="60" y="26" width="20" height="3" rx="1" fill="rgba(255,255,255,.7)" />
      <rect x="60" y="31" width="30" height="2" rx="1" fill="rgba(255,255,255,.3)" />
      <rect x="60" y="35" width="12" height="4" rx="2" fill="rgba(255,255,255,.1)" />
      <!-- stat row -->
      <rect x="56" y="45" width="14" height="12" rx="3" fill="white" />
      <rect x="73" y="45" width="14" height="12" rx="3" fill="white" />
      <rect x="90" y="45" width="14" height="12" rx="3" fill="white" />
      <!-- activity cards -->
      <rect x="56" y="60" width="48" height="13" rx="3" fill="white" />
      <rect x="59" y="63" width="22" height="3" rx="1" fill="#111827" opacity=".7" />
      <rect x="59" y="68" width="15" height="2" rx="1" fill="#9CA3AF" />
      <rect x="89" y="61" width="12" height="5" rx="2" fill="#D42027" />
      <rect x="56" y="76" width="48" height="13" rx="3" fill="white" />
      <rect x="59" y="79" width="22" height="3" rx="1" fill="#111827" opacity=".7" />
      <rect x="59" y="84" width="15" height="2" rx="1" fill="#9CA3AF" />
      <rect x="89" y="77" width="12" height="5" rx="2" fill="#1D4ED8" />
      <!-- nav bar -->
      <rect x="54" y="88" width="52" height="6" rx="0" fill="white" />
    </svg>
  </template>
</body>

</html>
